name: RIT-UTILS

on:
  push:
    branches: [ main, test ]
  pull_request:
    branches: [ main, test ]

jobs:
  tests:
    name: Run pytest tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'

    - name: Install Poetry
      uses: snok/install-poetry@v1
      with:
        version: latest
        virtualenvs-create: true
        virtualenvs-in-project: true

    - name: Load cached venv
      id: cached-poetry-dependencies
      uses: actions/cache@v3
      with:
        path: .venv
        key: venv-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}

    - name: Install dependencies
      if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
      run: poetry install --no-interaction --no-ansi --no-root

    - name: Install dependencies (cache hit)
      if: steps.cached-poetry-dependencies.outputs.cache-hit == 'true'
      run: poetry install --no-interaction --no-ansi --no-root

    - name: Run pytest
      env:
        LOGIN: test_user
        PASSWORD: test_password
        JWT_SECRET_KEY: test-secret-key-for-ci
        SEND_FROM: test@example.com
        EMAIL_PASS: test_password
        ADDR_TO: test@example.com
        BCC_TO: test@example.com
        PYTHONPATH: ${{ github.workspace }}
      run: |
        poetry run pytest

  build_and_push_to_docker_hub:
    name: Build and push Docker image to DockerHub
    runs-on: ubuntu-latest
    needs: tests
    if: |
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/test')) ||
      (github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true && (github.event.pull_request.base.ref == 'main' || github.event.pull_request.base.ref == 'test'))

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata (for tags)
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/rit-utils
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/rit-utils:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/rit-utils:buildcache,mode=max

  deploy:
    name: Deploy to production server
    runs-on: ubuntu-latest
    needs: build_and_push_to_docker_hub
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main')

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}

      - name: Copy files and deploy
        env:
          DEPLOY_HOST: ${{ secrets.HOST_PROD }}
          DEPLOY_USER: ${{ secrets.USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          IMAGE_TAG: main-${{ github.sha }}
        run: |
          set -euo pipefail

          SSH_PORT="${SSH_PORT:-22}"
          REMOTE="${DEPLOY_USER}@${DEPLOY_HOST}"
          REMOTE_DIR="/home/${DEPLOY_USER}/rit-utils"
          SSH_OPTS="-p ${SSH_PORT} -o ConnectTimeout=60 -o ServerAliveInterval=30 -o StrictHostKeyChecking=accept-new"
          IMAGE_TAG="${IMAGE_TAG:0:12}"

          ssh-keyscan -p "${SSH_PORT}" -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts

          ssh ${SSH_OPTS} "${REMOTE}" "mkdir -p ${REMOTE_DIR}/nginx/conf.d"
          scp ${SSH_OPTS} docker-compose.production.yml "${REMOTE}:${REMOTE_DIR}/"
          scp ${SSH_OPTS} -r nginx "${REMOTE}:${REMOTE_DIR}/"

          ssh ${SSH_OPTS} "${REMOTE}" bash -s <<EOF
          set -euo pipefail
          cd "${REMOTE_DIR}"
          export IMAGE_TAG="${IMAGE_TAG}"
          docker-compose -f docker-compose.production.yml pull
          docker-compose -f docker-compose.production.yml down
          docker-compose -f docker-compose.production.yml up -d
          docker-compose -f docker-compose.production.yml ps
          EOF

  deploy_test:
    name: Deploy to test server
    runs-on: ubuntu-latest
    needs: build_and_push_to_docker_hub
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/test') ||
      (github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'test')

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}

      - name: Copy files and deploy
        env:
          DEPLOY_HOST: ${{ secrets.HOST_TEST }}
          DEPLOY_USER: ${{ secrets.USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          IMAGE_TAG: test-${{ github.sha }}
        run: |
          set -euo pipefail

          SSH_PORT="${SSH_PORT:-22}"
          REMOTE="${DEPLOY_USER}@${DEPLOY_HOST}"
          REMOTE_DIR="/home/${DEPLOY_USER}/rit-utils"
          SSH_OPTS="-p ${SSH_PORT} -o ConnectTimeout=60 -o ServerAliveInterval=30 -o StrictHostKeyChecking=accept-new"
          IMAGE_TAG="${IMAGE_TAG:0:12}"

          ssh-keyscan -p "${SSH_PORT}" -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts

          ssh ${SSH_OPTS} "${REMOTE}" "mkdir -p ${REMOTE_DIR}/nginx/conf.d"
          scp ${SSH_OPTS} docker-compose.production.yml "${REMOTE}:${REMOTE_DIR}/"
          scp ${SSH_OPTS} -r nginx "${REMOTE}:${REMOTE_DIR}/"

          ssh ${SSH_OPTS} "${REMOTE}" bash -s <<EOF
          set -euo pipefail
          cd "${REMOTE_DIR}"
          export IMAGE_TAG="${IMAGE_TAG}"
          docker-compose -f docker-compose.production.yml pull
          docker-compose -f docker-compose.production.yml down
          docker-compose -f docker-compose.production.yml up -d
          docker-compose -f docker-compose.production.yml ps
          EOF

  send_message_prod:
    name: Send Telegram notification (production)
    runs-on: ubuntu-latest
    needs: deploy
    if: |
      needs.deploy.result == 'success' && (
        (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
        (github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main')
      )

    steps:
      - name: Get commit message
        id: commit_info
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            COMMIT_MSG="${{ github.event.head_commit.message }}"
          elif [ "${{ github.event_name }}" == "pull_request" ]; then
            COMMIT_MSG="${{ github.event.pull_request.title }}"
          else
            COMMIT_MSG="N/A"
          fi
          echo "message<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMIT_MSG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send success message
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ✅ Деплой на прод успешно выполнен!
            Ветка: ${{ github.ref_name }}
            Коммит: ${{ github.sha }}
            Описание: ${{ steps.commit_info.outputs.message }}

  send_message_test:
    name: Send Telegram notification (test)
    runs-on: ubuntu-latest
    needs: deploy_test
    if: |
      needs.deploy_test.result == 'success' && (
        (github.event_name == 'push' && github.ref == 'refs/heads/test') ||
        (github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'test')
      )

    steps:
      - name: Get commit message
        id: commit_info
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            COMMIT_MSG="${{ github.event.head_commit.message }}"
          elif [ "${{ github.event_name }}" == "pull_request" ]; then
            COMMIT_MSG="${{ github.event.pull_request.title }}"
          else
            COMMIT_MSG="N/A"
          fi
          echo "message<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMIT_MSG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send success message
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ✅ Деплой на тест успешно выполнен!
            Ветка: ${{ github.ref_name }}
            Коммит: ${{ github.sha }}
            Описание: ${{ steps.commit_info.outputs.message }}
